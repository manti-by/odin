server {
    listen 443 ssl http2;
    server_name demetra.manti.by;

    location /assets/ {
        alias /home/manti/www/demetra/hera/dist/assets/;

        if ($request_filename ~ "^.*/(.+\.(jpe?g|png|svg|avif|js|css|webm|mp4|pdf|ico|woff|woff2|json))$") {
            expires max;
            access_log off;

            add_header Pragma 'public';
            add_header Cache-Control 'public, must-revalidate, proxy-revalidate';
            add_header Access-Control-Allow-Origin *;
            break;
        }

        return 403;
    }

    location /api/ {
        include /home/manti/www/odin/configs/proxy.params;
        proxy_pass http://127.0.0.1:8001;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:8001;
    }

    location / {
        include /home/manti/www/odin/configs/proxy.params;
        proxy_pass http://127.0.0.1:3000;
    }

    ssl_certificate /etc/odin/fullchain.pem;
    ssl_certificate_key /etc/odin/privkey.pem;
}

